---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: shadowbroker
  namespace: {{ .Values.argocd.namespace }}
spec:
  project: default
  source:
    repoURL: {{ .Values.repo.url }}
    path: k8s/argocd-deploy/shadowbroker
    targetRevision: HEAD
    helm:
      valueFiles:
        - ../values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: shadowbroker

  syncPolicy:
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=false
    automated:
      selfHeal: true
