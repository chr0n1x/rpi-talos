---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: shadowbroker-secrets-vaultsecret-ref
  namespace: {{ .Release.Namespace }}
spec:
  type: kv-v2
  mount: in-cluster
  path: shadowbroker/env
  destination:
    name: shadowbroker-env
    create: true
  refreshAfter: 30s
  vaultAuthRef: {{ .Release.Namespace -}}/shadowbroker-vso-connection-auth
